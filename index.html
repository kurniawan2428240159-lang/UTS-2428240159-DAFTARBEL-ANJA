<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Daftar-belanja</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" 
    rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" 
    crossorigin="anonymous">
</head>
<body>
    <div class="conatiner">
        <h2 class="text-center bg-primary text-white p-3 rounded-5 mt-3">daftar belanja</h2>

        nama barang
        <input type="text" id="nama" class="from-control border-primary mb-3"> 
        jumlah
        <input type="text" id="jumlah" class="from-control border-primary mb-3"> 
        keterangan
        <input type="text" id="keterangan" class="from-control border-primary mb-3"> 
    
        <button class="btn btn-primary" onclick="simpan()">Simpan</button>
     
        <div id="daftar-belanja" class="row"> </div>
    </div>
    

    <script src="scripts.js"></script>

    <div class="container mt-4">
        <h2>Responsive image</h2>
        <div class="row">
            <div class="col-md-8">
                <img src="image/bb.avif" class="img-fluid rounded" alt="Responsive image">
                <div class="card=footer text-body secondary">
                    source : https://unsplash.com/photos/a-plane-flying-in-the-sky-at-sunset-wQ50xWFZJAo</div>
            </div>
        </div>
    </div>
